[profile.default]
via_ir = true
optimizer = true
optimizer_runs = 200
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.26"
eth_rpc_url = "http://localhost:8545"

# Chain id (31337 for local anvil; change to 56 for BSC mainnet deployment)
chain_id = 31337

# Allow Deploy script to write deployments/<chainid>/addresses.json
fs_permissions = [{ access = "read-write", path = "./deployments" }]

# BSC mainnet fork tests:
#   FOUNDRY_PROFILE=fork forge test --match-contract BSCForkTest --fork-url $BSC_RPC_URL -vvv
[profile.fork]
chain_id = 56

[rpc_endpoints]
bsc = "${BSC_RPC_URL}"

# Fuzz testing configuration
[profile.default.fuzz]
runs = 256
max_test_rejects = 65536
seed = "0x1"

# Invariant testing configuration
[profile.default.invariant]
runs = 256
depth = 50
fail_on_revert = false

# CI profile with higher fuzz runs
[profile.ci]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.26"

[profile.ci.fuzz]
runs = 4096
max_test_rejects = 65536

[profile.ci.invariant]
runs = 4096
depth = 100
fail_on_revert = false

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
